<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis + SQLite Dashboard</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container glass-panel">
        <header>
            <h1>Database Dashboard</h1>
            <p class="subtitle">SQLite + Redis Cache-Aside Pattern</p>
        </header>

        <main>
            <!-- Status Section -->
            <section class="card">
                <h2>System Health</h2>
                <div class="button-group">
                    <button id="btn-health" class="btn primary">Check Health</button>
                    <button id="btn-ping" class="btn secondary">Test Redis</button>
                </div>
                <div id="status-result" class="result-box"></div>
            </section>

            <!-- Add User Section -->
            <section class="card">
                <h2>Create / Update User</h2>
                <div class="form-group">
                    <label for="input-name">Name</label>
                    <input type="text" id="input-name" autocomplete="off" placeholder="Enter Full Name (e.g. Jane Doe)">
                </div>
                <div class="form-group">
                    <label for="input-email">Email</label>
                    <input type="text" id="input-email" autocomplete="off" placeholder="Enter Email (e.g. jane@example.com)">
                </div>
                <div class="button-group">
                    <button id="btn-save-user" class="btn accent">Save User</button>
                </div>
                <div id="save-result" class="result-box"></div>
            </section>

            <!-- User Lookup Section -->
            <section class="card">
                <h2>User Lookup Database</h2>
                
                <div class="form-group">
                    <label for="input-user">User ID (1, 2, or 3)</label>
                    <input type="text" id="input-user" autocomplete="off" placeholder="Enter User ID (e.g. 1)">
                </div>
                
                <div class="button-group">
                    <button id="btn-get" class="btn get-btn">Normal Fetch (Cache-Aside)</button>
                    <button id="btn-refresh" class="btn accent">Force DB Refresh</button>
                </div>
                
                <div class="button-group">
                    <button id="btn-clear-user" class="btn secondary">Clear User Cache</button>
                    <button id="btn-clear-all" class="btn">Clear ALL Cache</button>
                </div>
                
                <div id="kv-result" class="result-box"></div>
            </section>
        </main>

        <footer>
            <p>Built with <span class="heart">❤</span> using Flask, SQLite, and Redis</p>
        </footer>
    </div>

    <!-- Custom Scripts -->
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
